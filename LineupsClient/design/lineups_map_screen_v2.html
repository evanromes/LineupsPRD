  .ln-status { position: absolute; top: 0; left: 0; right: 0; height: 52px; background: #060F14cc; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 10; }

  .ln-search { background: #0F2D3A; border: 0.5px solid #1B5A6A; border-radius: 12px; padding: 9px 14px; display: flex; align-items: center; gap: 8px; flex: 1; margin-right: 10px; }

  .pin-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ln-callout { position: absolute; bottom: 90px; left: 14px; right: 14px; background: #0F2D3A; border: 0.5px solid #1B6878; border-radius: 18px; padding: 14px 16px; z-index: 10; }

  .ln-pill { display: inline-block; border-radius: 6px; padding: 3px 8px; font-size: 10px; font-family: 'Helvetica Neue', sans-serif; letter-spacing: 0.5px; }
  .ln-callout-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
  .ln-stat { background: #0B2230; border-radius: 8px; padding: 7px 8px; }
  .ln-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: #060F14ee; border-top: 0.5px solid #1B3A45; display: flex; align-items: center; justify-content: space-around; padding: 0 8px 12px; z-index: 10; }

  .ln-nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .ln-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 12px; background: #060F14; border-radius: 0 0 10px 10px; z-index: 20; }
</style>
